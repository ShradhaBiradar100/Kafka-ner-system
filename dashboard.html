<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NER Analytics Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; padding: 30px; }
        h1 { text-align: center; font-size: 2rem; margin-bottom: 8px; color: #38bdf8; }
        .subtitle { text-align: center; color: #94a3b8; margin-bottom: 30px; }
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: #1e293b; border-radius: 12px; padding: 24px; text-align: center; border: 1px solid #334155; }
        .stat-card .number { font-size: 2.5rem; font-weight: bold; color: #38bdf8; }
        .stat-card .label { color: #94a3b8; margin-top: 6px; font-size: 0.9rem; }
        .charts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px; }
        .chart-card { background: #1e293b; border-radius: 12px; padding: 24px; border: 1px solid #334155; }
        .chart-card h3 { margin-bottom: 16px; color: #cbd5e1; font-size: 1rem; }
        .refresh-btn { display: block; margin: 0 auto; padding: 12px 32px; background: #38bdf8; color: #0f172a; border: none; border-radius: 8px; font-size: 1rem; font-weight: bold; cursor: pointer; }
        .refresh-btn:hover { background: #7dd3fc; }
        .last-updated { text-align: center; color: #475569; margin-top: 12px; font-size: 0.85rem; }
    </style>
</head>
<body>
    <h1>🧠 NER Analytics Dashboard</h1>
    <p class="subtitle">Real-time Named Entity Recognition Pipeline</p>

    <div class="stats-grid">
        <div class="stat-card">
            <div class="number" id="total">-</div>
            <div class="label">Total Entities</div>
        </div>
        <div class="stat-card">
            <div class="number" id="persons">-</div>
            <div class="label">Persons</div>
        </div>
        <div class="stat-card">
            <div class="number" id="orgs">-</div>
            <div class="label">Organizations</div>
        </div>
    </div>

    <div class="charts-grid">
        <div class="chart-card">
            <h3>Entities by Type</h3>
            <canvas id="labelChart"></canvas>
        </div>
        <div class="chart-card">
            <h3>Top Entities</h3>
            <canvas id="topChart"></canvas>
        </div>
    </div>

    <button class="refresh-btn" onclick="fetchStats()">🔄 Refresh</button>
    <p class="last-updated" id="lastUpdated"></p>

    <script>
        let labelChart, topChart;

        async function fetchStats() {
            try {
                const res = await fetch('http://localhost:8081/api/stats');
                const data = await res.json();

                document.getElementById('total').textContent = data.totalEntities;
                document.getElementById('persons').textContent = data.byLabel.PERSON || 0;
                document.getElementById('orgs').textContent = data.byLabel.ORG || 0;
                document.getElementById('lastUpdated').textContent = 'Last updated: ' + new Date().toLocaleTimeString();

                const labelLabels = Object.keys(data.byLabel);
                const labelData = Object.values(data.byLabel);
                const topLabels = Object.keys(data.topEntities);
                const topData = Object.values(data.topEntities);

                if (labelChart) labelChart.destroy();
                if (topChart) topChart.destroy();

                labelChart = new Chart(document.getElementById('labelChart'), {
                    type: 'doughnut',
                    data: {
                        labels: labelLabels,
                        datasets: [{ data: labelData, backgroundColor: ['#38bdf8', '#818cf8', '#34d399', '#fb923c'] }]
                    },
                    options: { plugins: { legend: { labels: { color: '#e2e8f0' } } } }
                });

                topChart = new Chart(document.getElementById('topChart'), {
                    type: 'bar',
                    data: {
                        labels: topLabels,
                        datasets: [{ data: topData, backgroundColor: '#818cf8', borderRadius: 6 }]
                    },
                    options: {
                        plugins: { legend: { display: false } },
                        scales: {
                            x: { ticks: { color: '#94a3b8' }, grid: { color: '#1e293b' } },
                            y: { ticks: { color: '#94a3b8', stepSize: 1 }, grid: { color: '#334155' } }
                        }
                    }
                });
            } catch (e) {
                alert('Could not connect to API. Make sure analytics-consumer is running on port 8081.');
            }
        }

        fetchStats();
        setInterval(fetchStats, 10000);
    </script>
</body>
</html>
